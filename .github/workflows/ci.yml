name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    # Linux runners are free for public repos and fast. lp10 ships for macOS, but
    # nothing here is darwin-only to build or test: there are no GOOS build tags,
    # security(1) is stubbed in the askpass test, the device shell loop is
    # POSIX-clean, and ptys / TIOCGWINSZ exist on Linux too.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          check-latest: true
      - name: gofmt
        run: |
          unformatted="$(gofmt -l .)"
          if [ -n "$unformatted" ]; then
            echo "These files need gofmt:"; echo "$unformatted"; exit 1
          fi
      - name: vet
        run: go vet ./...
      - name: test
        run: go test -race ./...
