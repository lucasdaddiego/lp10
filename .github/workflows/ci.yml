name: CI

on:
  push:
    branches: [master]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    # lp10 ships for macOS and Linux. The OS password-store integration is the
    # one platform-specific piece (security(1) on darwin, secret-tool on Linux —
    # see internal/transport/secret_*.go) and is stubbed in the askpass tests, so
    # both jobs run the full suite. Everything else is portable: pure-Go mDNS, the
    # POSIX device shell loop, ptys / TIOCGWINSZ. We test both.
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          check-latest: true
      - name: gofmt
        run: |
          unformatted="$(gofmt -l .)"
          if [ -n "$unformatted" ]; then
            echo "These files need gofmt:"; echo "$unformatted"; exit 1
          fi
      - name: vet
        run: go vet ./...
      - name: modernize
        # go fix -diff prints a patch and exits non-zero when the tree isn't at the
        # toolchain modernizer's fixpoint; run `go fix ./...` locally to clear it.
        run: go fix -diff ./...
      - name: test
        run: go test -race ./...
